<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Guscott Engineering">
  <title>Guscott Engineering</title>
  <!-- Chamfered ink tile — the signature ge-cut facet (top-left + bottom-right cut) -->
  <path d="M7 0H32V25L25 32H0V7Z" fill="#0A0C0F"/>
  <!-- Lit facet: subtle highlight along the top-left cut (single light source, top-left) -->
  <path d="M0.6 7 7 0.6" fill="none" stroke="#FFFFFF" stroke-opacity="0.40" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Voltage accent catching the bottom-right cut -->
  <path d="M31.4 25 25 31.4" fill="none" stroke="#2D5BFF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- G monogram — geometric, drawn as paths so it renders identically at any size and in any rasterizer -->
  <g fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23.19 19.51A8 8 0 1 1 23.19 12.49"/>
    <path d="M16.6 16H23.19V19.51"/>
  </g>
</svg>
