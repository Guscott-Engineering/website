<!-- ============ TRUST / BUYING ============ -->
<section data-tone="light" style="background:var(--paper);">
  <div style="max-width:1100px;margin:0 auto;padding:80px 24px;">
    <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--volt-600);margin-bottom:10px;">How buying works</div>
    <h2 style="font-family:var(--font-display);font-weight:700;font-size:clamp(26px,3vw,36px);color:var(--ink-900);margin:0 0 34px;letter-spacing:.005em;">Straightforward, local, backed</h2>
    <div class="ge-trust-grid">
      <div class="ge-card ge-card--pad">
        <div class="ge-lico" style="font-size:24px;color:var(--volt-600);margin-bottom:14px;"><i data-lucide="shield-check"></i></div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Warranty</div>
        <p style="font-size:15px;line-height:1.6;color:var(--text-body);margin:0;">Something not right? Bring it back and we'll figure it out.</p>
      </div>
      <div class="ge-card ge-card--pad">
        <div class="ge-lico" style="font-size:24px;color:var(--volt-600);margin-bottom:14px;"><i data-lucide="wallet"></i></div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Payment</div>
        <p style="font-size:15px;line-height:1.6;color:var(--text-body);margin:0;">Pay by Zelle, Cash App, or cash. Whatever's easiest for you.</p>
      </div>
      <div class="ge-card ge-card--pad">
        <div class="ge-lico" style="font-size:24px;color:var(--volt-600);margin-bottom:14px;"><i data-lucide="map-pin"></i></div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Local pickup</div>
        <p style="font-size:15px;line-height:1.6;color:var(--text-body);margin:0;">Local to Atlanta, GA — built for local pickup, set up in person.</p>
      </div>
    </div>
  </div>
</section>
