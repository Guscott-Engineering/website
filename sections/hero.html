<!-- ============ HERO ============ -->
<section data-tone="dark" style="position:relative;background:var(--ink-900);color:var(--ink-25);overflow:hidden;">
  <div style="position:absolute;inset:0;background:url(assets/converging-fields.svg) center/cover no-repeat;opacity:.45;pointer-events:none;"></div>
  <div style="position:absolute;width:640px;height:640px;right:-180px;top:-160px;border-radius:50%;background:radial-gradient(circle,var(--volt-glow) 0%,transparent 62%);pointer-events:none;"></div>
  <div style="position:relative;max-width:1100px;margin:0 auto;padding:136px 24px 94px;">
    <div class="ge-hero-grid">
      <div style="animation:geFade .6s var(--ease-mechanical) both;">
        <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--volt-400);margin-bottom:22px;">Custom builds · Refurbished · Atlanta, GA</div>
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(40px,6vw,72px);line-height:1.05;letter-spacing:.005em;margin:0 0 22px;">Engineering from a<br>different angle</h1>
        <p style="font-size:18px;line-height:1.6;color:var(--ink-200);max-width:44ch;margin:0 0 14px;">Building and refurbishing computers in Atlanta, GA — one machine at a time.</p>
        <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-400);margin:0 0 36px;">Built by Ayden · Solo builder</p>
        <a class="ge-btn ge-btn--primary ge-btn--lg" href="#available" data-scroll="available">See What's Available</a>
      </div>
      <div style="animation:geFade .6s .12s var(--ease-mechanical) both;position:relative;">
        <div class="ge-cut" style="position:absolute;inset:-1.5px;background:linear-gradient(135deg,var(--volt-500) 0%,transparent 50%);opacity:.7;"></div>
        <div class="ge-cut" style="position:relative;background:var(--ink-1000);aspect-ratio:4/5;box-shadow:var(--elev-dark-2);">
          <img src="images/IMG_3399.JPG" alt="Custom build, powered on" style="width:100%;height:100%;object-fit:cover;display:block;">
        </div>
        <div style="position:absolute;bottom:14px;left:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-200);background:rgba(10,12,15,.6);padding:5px 9px;border-radius:3px;">Lian Li · RX 6700 · NZXT cooled</div>
      </div>
    </div>
  </div>
</section>
