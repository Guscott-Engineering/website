<!-- ============ CONTACT ============ -->
<section id="contact" data-tone="dark" style="position:relative;background:var(--ink-900);color:var(--ink-25);overflow:hidden;scroll-margin-top:72px;">
  <div style="position:absolute;inset:0;background:url(assets/converging-fields.svg) center/cover no-repeat;opacity:.32;pointer-events:none;"></div>
  <div style="position:absolute;width:560px;height:560px;right:-160px;top:-160px;border-radius:50%;background:radial-gradient(circle,var(--volt-glow) 0%,transparent 62%);pointer-events:none;"></div>
  <div style="position:relative;max-width:760px;margin:0 auto;padding:92px 24px;text-align:center;">
    <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--volt-400);margin-bottom:16px;">Get in touch</div>
    <h2 style="font-family:var(--font-display);font-weight:700;font-size:clamp(30px,4vw,48px);color:#fff;margin:0 0 16px;letter-spacing:.005em;">Let's build something</h2>
    <p style="font-size:17px;line-height:1.6;color:var(--ink-300);margin:0 0 40px;">Questions on a build, or want one of the machines above? Reach out — Ayden answers personally.</p>
    <div class="ge-contact-grid" style="margin-bottom:40px;text-align:left;">
      <div style="box-shadow:var(--elev-dark-1);background:var(--ink-800);border-radius:8px;padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);">
        <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-400);margin-bottom:7px;">Email</div>
        <a href="mailto:Guscottengineering@gmail.com" style="font-family:var(--font-mono);font-size:13px;color:var(--volt-300);text-decoration:none;">Send a message</a>
      </div>
      <div style="box-shadow:var(--elev-dark-1);background:var(--ink-800);border-radius:8px;padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);">
        <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-400);margin-bottom:7px;">Facebook Marketplace</div>
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--ink-100);">Search "Ayden" / Guscott Engineering</span>
      </div>
      <div style="box-shadow:var(--elev-dark-1);background:var(--ink-800);border-radius:8px;padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);">
        <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-400);margin-bottom:7px;">Location</div>
        <span style="font-family:var(--font-mono);font-size:13px;color:var(--ink-100);">Atlanta, GA</span>
      </div>
    </div>
    <a class="ge-btn ge-btn--primary ge-btn--lg" href="mailto:Guscottengineering@gmail.com">Email Ayden</a>
  </div>
</section>
